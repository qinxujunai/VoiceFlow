<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">VoiceFlow compact dictation overlay demo</title>
  <desc id="desc">Animated preview of VoiceFlow growing pill, live text, processing spinner, and completion state.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-80%" width="140%" height="260%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eceff5"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27272b" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#161719" stop-opacity="0.92"/>
    </linearGradient>
    <clipPath id="textClip">
      <rect x="410" y="146" width="190" height="28" rx="8"/>
    </clipPath>
  </defs>

  <rect width="960" height="320" fill="url(#bg)"/>
  <rect x="72" y="62" width="816" height="196" rx="28" fill="#fff" opacity="0.72"/>
  <text x="96" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#202124">VoiceFlow</text>
  <text x="96" y="134" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#69707d">Press F2. Speak. Paste. Never lose text.</text>

  <g filter="url(#shadow)">
    <rect id="p" x="410" y="136" width="140" height="48" rx="24" fill="url(#pill)" stroke="#ffffff" stroke-opacity="0.10">
      <animate attributeName="x" values="410;370;320;320;374;410" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="width" values="140;220;320;320;212;140" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(430 152)">
    <rect x="0" y="8" width="3" height="13" rx="1.5" fill="#ff453a">
      <animate attributeName="height" values="9;20;9" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;4;10" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="4" width="3" height="21" rx="1.5" fill="#ff453a">
      <animate attributeName="height" values="20;10;20" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="4;9;4" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="16" y="9" width="3" height="12" rx="1.5" fill="#ff453a">
      <animate attributeName="height" values="10;18;10" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;5;10" dur="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g clip-path="url(#textClip)">
    <text x="464" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500" fill="#f5f5f7">
      Cursor and Codex at the cursor
      <animate attributeName="x" values="464;456;446;446;456;464" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;1;0" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <g transform="translate(526 160)" opacity="0">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#f5f5f7" stroke-width="2" stroke-linecap="round" stroke-dasharray="42 20">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <animate attributeName="opacity" values="0;0;0;1;0;0" dur="6s" repeatCount="indefinite"/>
  </g>

  <path d="M515 160 l8 8 l16 -18" fill="none" stroke="#32d74b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;0" dur="6s" repeatCount="indefinite"/>
  </path>

  <text x="480" y="236" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#69707d">
    Local preview -> full final transcription -> clipboard first
  </text>
</svg>
