<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'SF Pro Text','Segoe UI','Microsoft YaHei',sans-serif; background:transparent; overflow:hidden; user-select:none; }

.pill {
    display:flex; align-items:center; justify-content:center; gap:10px;
    height:48px; min-width:180px;
    background:#1c1c1e; border-radius:24px;
    border:0.5px solid rgba(255,255,255,0.1);
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    padding:0 20px; transition:min-width 0.3s;
}
.pill.wide { min-width:300px; padding:0 18px; justify-content:flex-start; }

/* 声波 */
.wave { display:flex; align-items:center; gap:2px; flex-shrink:0; }
.wave .b {
    width:3px; height:8px; background:#FF453A; border-radius:2px;
    animation:wa 1.2s ease-in-out infinite;
}
.wave .b:nth-child(1){animation-delay:0.0s}
.wave .b:nth-child(2){animation-delay:0.12s}
.wave .b:nth-child(3){animation-delay:0.24s}
.wave .b:nth-child(4){animation-delay:0.36s}
.wave .b:nth-child(5){animation-delay:0.48s}
@keyframes wa { 0%,100%{height:6px} 50%{height:22px} }

/* 圆点 */
.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dot.rec { background:#FF453A; animation:pu 1s ease-in-out infinite; }
.dot.proc { background:#FF9F0A; animation:pu 0.6s ease-in-out infinite; }
.dot.ok { background:#30D158; }
.dot.err { background:#FF453A; }
@keyframes pu { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

/* 文字 */
.txt { font-size:14px; color:rgba(255,255,255,0.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.txt.hint { color:rgba(255,255,255,0.3); font-size:13px; }

.hidden { display:none !important; }
</style>
</head>
<body>
<div id="pill" class="pill">
    <div id="wave" class="wave"><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div></div>
    <div id="dot" class="dot hidden"></div>
    <div id="txt" class="txt hint">聆听中...</div>
</div>
<script>
const pl=document.getElementById('pill'), wv=document.getElementById('wave'),
      dt=document.getElementById('dot'), tx=document.getElementById('txt');

function reset() {
    pl.classList.remove('wide'); wv.classList.remove('hidden');
    dt.classList.add('hidden'); dt.className='dot';
    tx.className='txt hint'; tx.textContent='聆听中...';
}
function showRecording() { reset(); }
function showProcessing() {
    wv.classList.add('hidden'); dt.classList.remove('hidden');
    dt.className='dot proc'; tx.textContent='处理中...';
}
function showResult(t) {
    wv.classList.add('hidden'); dt.classList.remove('hidden');
    dt.className='dot ok'; tx.className='txt'; tx.textContent=t||'完成';
    pl.classList.add('wide');
}
function showError(m) {
    wv.classList.add('hidden'); dt.classList.remove('hidden');
    dt.className='dot err'; tx.className='txt'; tx.textContent=m;
    pl.classList.add('wide');
}
</script>
</body>
</html>
