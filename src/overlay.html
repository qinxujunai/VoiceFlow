<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<style>
:root {
    --bg: rgba(30,30,32,0.96);
    --red: #ff375f;
    --green: #30d158;
    --gold: #ff9f0a;
    --text: #f5f5f7;
    --muted: #8e8e93;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: transparent; overflow: hidden; user-select: none;
    -webkit-font-smoothing: antialiased;
}

.pill {
    display: inline-flex; align-items: center; gap: 10px;
    height: 46px; padding: 0 16px;
    background: var(--bg);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border-radius: 23px;
    border: 0.5px solid rgba(255,255,255,0.08);
    box-shadow:
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 0.5px 0 rgba(255,255,255,0.04);
    min-width: 150px; max-width: 650px;
    transition: min-width 0.25s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.3s ease, border-color 0.3s ease;
}

.pill.rec  { border-color: rgba(255,55,95,0.2); }
.pill.proc { border-color: rgba(255,159,10,0.2); }
.pill.done { border-color: rgba(48,209,88,0.15); }

/* ---- 波形 ---- */
.wave {
    display: flex; align-items: flex-end; gap: 2.5px; height: 22px; flex-shrink: 0;
}
.wave .b {
    width: 3px; border-radius: 1.5px;
    background: var(--red);
    animation: w 1.4s ease-in-out infinite;
}
.wave .b:nth-child(1){height:6px;animation-delay:0.00s}
.wave .b:nth-child(2){height:14px;animation-delay:0.10s}
.wave .b:nth-child(3){height:20px;animation-delay:0.20s}
.wave .b:nth-child(4){height:12px;animation-delay:0.30s}
.wave .b:nth-child(5){height:18px;animation-delay:0.40s}
.wave .b:nth-child(6){height:8px;animation-delay:0.50s}
.wave .b:nth-child(7){height:16px;animation-delay:0.60s}
.wave .b:nth-child(8){height:10px;animation-delay:0.70s}
.wave .b:nth-child(9){height:15px;animation-delay:0.80s}

@keyframes w {
    0%,100%{transform:scaleY(0.4);opacity:0.6}
    50%{transform:scaleY(1.15);opacity:1}
}
.pill.proc .wave .b { background: var(--gold); }

/* ---- 圆点 ---- */
.dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
}
.dot.rec {
    background: var(--red); box-shadow: 0 0 6px rgba(255,55,95,0.5);
    animation: pu 1.2s ease-in-out infinite;
}
.dot.proc {
    background: var(--gold); box-shadow: 0 0 6px rgba(255,159,10,0.5);
    animation: pu 0.7s ease-in-out infinite;
}
.dot.ok  { background: var(--green); }
.dot.err { background: var(--red); }
@keyframes pu { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.25;transform:scale(0.5)} }

/* ---- 文字 ---- */
.text {
    font-size: 14px; font-weight: 430; letter-spacing: 0.1px;
    color: var(--text); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; min-width: 0; line-height: 1.1;
}
.text.hint { color: var(--muted); font-size: 13px; }
.text.result { color: var(--green); }
.text.stream { direction: rtl; text-align: left; }

/* ---- 分隔 ---- */
.sep {
    width: 0.5px; height: 16px; background: rgba(255,255,255,0.1);
    border-radius: 1px; flex-shrink: 0;
}

.hidden { display: none !important; }

/* 文字逐个出现的闪烁光标（打字感） */
.text.stream::after {
    content: '';
    display: inline-block; width: 1.5px; height: 14px;
    background: rgba(255,255,255,0.5);
    margin-left: 1px; vertical-align: middle;
    animation: blink 0.5s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div id="pill" class="pill rec">
    <div id="wave" class="wave">
        <div class="b"></div><div class="b"></div><div class="b"></div>
        <div class="b"></div><div class="b"></div><div class="b"></div>
        <div class="b"></div><div class="b"></div><div class="b"></div>
    </div>
    <div id="dot" class="dot hidden"></div>
    <div id="sep" class="sep hidden"></div>
    <div id="txt" class="text hint">聆听中...</div>
</div>

<script>
const pill=document.getElementById('pill'), wave=document.getElementById('wave'),
      dot=document.getElementById('dot'), sep=document.getElementById('sep'),
      txt=document.getElementById('txt');

function reset() {
    pill.className='pill rec'; wave.classList.remove('hidden');
    dot.classList.add('hidden'); dot.className='dot';
    sep.classList.add('hidden');
    txt.className='text hint'; txt.textContent='聆听中...';
    txt.style.direction=''; txt.style.textAlign='';
}
function showRecording() { reset(); }

function updateStreaming(t) {
    if (!t) return;
    wave.classList.add('hidden');
    dot.classList.remove('hidden'); dot.className='dot rec';
    sep.classList.remove('hidden');
    txt.className='text stream';
    txt.style.direction='rtl'; txt.style.textAlign='left';
    txt.textContent = t;
}

function showProcessing() {
    pill.className='pill proc';
    wave.classList.remove('hidden'); dot.classList.add('hidden');
    sep.classList.add('hidden');
    txt.className='text hint'; txt.textContent='处理中...';
    txt.style.direction=''; txt.style.textAlign='';
}

function showResult(t) {
    pill.className='pill done';
    wave.classList.add('hidden');
    dot.classList.remove('hidden'); dot.className='dot ok';
    sep.classList.remove('hidden');
    txt.style.direction=''; txt.style.textAlign='';
    txt.className='text result'; txt.textContent = t || '';
}

function showError(m) {
    pill.className='pill rec';
    wave.classList.add('hidden');
    dot.classList.remove('hidden'); dot.className='dot err';
    sep.classList.remove('hidden');
    txt.style.direction=''; txt.style.textAlign='';
    txt.className='text'; txt.textContent = m;
}
</script>
</body>
</html>
