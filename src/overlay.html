<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<style>
:root {
    --bg: #1a1a1f;
    --red: #ff3b5c;
    --green: #34d399;
    --gold: #f59e0b;
    --text: #f1f1f3;
    --muted: #8e8e93;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Microsoft YaHei', sans-serif;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
}

/* ---- 基础胶囊 ---- */
.pill {
    display: flex; align-items: center; gap: 12px;
    height: 54px; padding: 0 22px;
    background: var(--bg);
    border-radius: 27px;
    border: 0.5px solid rgba(255,255,255,0.08);
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 8px 32px rgba(0,0,0,0.5),
        0 2px 8px rgba(0,0,0,0.3);
    min-width: 200px;
    justify-content: center;
    transition: all 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* 录音中 — 红色辉光 */
.pill.recording {
    border-color: rgba(255,59,92,0.3);
    box-shadow:
        0 0 24px rgba(255,59,92,0.12),
        0 8px 32px rgba(0,0,0,0.5);
}

/* 处理中 — 金色辉光 */
.pill.processing {
    border-color: rgba(245,158,11,0.3);
    box-shadow:
        0 0 24px rgba(245,158,11,0.1),
        0 8px 32px rgba(0,0,0,0.5);
}

/* 完成 — 绿色辉光 */
.pill.done {
    border-color: rgba(52,211,153,0.25);
    box-shadow:
        0 0 20px rgba(52,211,153,0.08),
        0 8px 32px rgba(0,0,0,0.5);
}

/* 有文字结果时加宽 */
.pill.wide { min-width: 380px; padding:0 22px; justify-content:flex-start; }

/* ---- 波形 ---- */
.waveform {
    display: flex; align-items: flex-end; gap: 3px;
    height: 28px; flex-shrink: 0;
}
.waveform .bar {
    width: 4px; border-radius: 2px;
    background: linear-gradient(180deg, var(--red), #ff6b81);
    animation: wave 0.8s ease-in-out infinite;
}
.waveform .bar:nth-child(1) { height: 10px; animation-delay: 0.00s; }
.waveform .bar:nth-child(2) { height: 18px; animation-delay: 0.08s; }
.waveform .bar:nth-child(3) { height: 26px; animation-delay: 0.16s; }
.waveform .bar:nth-child(4) { height: 16px; animation-delay: 0.24s; }
.waveform .bar:nth-child(5) { height: 24px; animation-delay: 0.32s; }
.waveform .bar:nth-child(6) { height: 12px; animation-delay: 0.40s; }
.waveform .bar:nth-child(7) { height: 20px; animation-delay: 0.48s; }
.waveform .bar:nth-child(8) { height: 14px; animation-delay: 0.56s; }
.waveform .bar:nth-child(9) { height: 22px; animation-delay: 0.64s; }

@keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1.3); }
}

/* 处理中波形换成金色渐变 */
.pill.processing .waveform .bar {
    background: linear-gradient(180deg, var(--gold), #fbbf24);
}

/* ---- 圆点 ---- */
.dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    transition: all 0.3s ease;
}
.dot.rec { background: var(--red); box-shadow: 0 0 8px rgba(255,59,92,0.5); animation: pulse 0.8s ease-in-out infinite; }
.dot.proc { background: var(--gold); box-shadow: 0 0 8px rgba(245,158,11,0.5); animation: pulse 0.5s ease-in-out infinite; }
.dot.ok { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
@keyframes pulse {
    0%, 100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.65); }
}

/* ---- 文字 ---- */
.text {
    font-size: 15px; font-weight: 450; letter-spacing: 0.1px;
    color: var(--text); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; min-width: 0; line-height: 1;
}
.text.hint { color: var(--muted); font-size: 14px; }
.text.result { color: var(--green); }

/* ---- 分隔线 ---- */
.divider {
    width: 0.5px; height: 20px; background: rgba(255,255,255,0.1);
    border-radius: 1px; flex-shrink: 0;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="pill" class="pill recording">
    <!-- 波形 -->
    <div id="wave" class="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <!-- 圆点（处理/完成时切换显示） -->
    <div id="dot" class="dot hidden"></div>
    <!-- 分隔 -->
    <div id="sep" class="divider hidden"></div>
    <!-- 文字 -->
    <div id="txt" class="text hint">聆听中...</div>
</div>

<script>
const pill = document.getElementById('pill');
const wave = document.getElementById('wave');
const dot  = document.getElementById('dot');
const sep  = document.getElementById('sep');
const txt  = document.getElementById('txt');

function reset() {
    pill.className = 'pill recording';
    wave.classList.remove('hidden');
    dot.classList.add('hidden');
    sep.classList.add('hidden');
    dot.className = 'dot';
    txt.className = 'text hint';
    txt.textContent = '聆听中...';
}

// 录音中
function showRecording() { reset(); }

// 处理中 — 波形变金 + 辉光
function showProcessing() {
    pill.className = 'pill processing';
    txt.textContent = '处理中...';
}

// 完成 — 绿点 + 分隔线 + 结果文字
function showResult(t) {
    pill.className = 'pill done wide';
    wave.classList.add('hidden');
    dot.classList.remove('hidden');
    dot.className = 'dot ok';
    sep.classList.remove('hidden');
    txt.className = 'text result';
    txt.textContent = t || '';
}

// 错误
function showError(m) {
    pill.className = 'pill recording wide';
    wave.classList.add('hidden');
    dot.classList.remove('hidden');
    dot.className = 'dot rec';
    sep.classList.remove('hidden');
    txt.className = 'text';
    txt.textContent = m;
}
</script>
</body>
</html>
