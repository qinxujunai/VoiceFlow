<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<style>
:root {
    --bg: rgba(24, 24, 26, 0.88);
    --line: rgba(255, 255, 255, 0.09);
    --text: #f5f5f7;
    --muted: rgba(245, 245, 247, 0.54);
    --red: #ff453a;
    --blue: #64a7ff;
    --gold: #ffb340;
    --green: #32d74b;
    --target-width: 92px;
    --ticker-offset: 0px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
}

.pill {
    width: var(--target-width);
    height: 34px;
    max-width: 260px;
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    border-radius: 17px;
    background: var(--bg);
    border: 0.5px solid var(--line);
    box-shadow:
        0 0 0 0.5px rgba(0, 0, 0, 0.10),
        0 1px 3px rgba(0, 0, 0, 0.12),
        0 3px 8px rgba(0, 0, 0, 0.07),
        inset 0 0.5px 0 rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    transform-origin: center center;
    transition:
        width 150ms cubic-bezier(0.22, 0.72, 0.22, 1),
        border-color 140ms ease,
        opacity 120ms ease;
}

.pill.idle {
    opacity: 0;
}

.pill.listening {
    --target-width: 86px;
    border-color: rgba(255, 69, 58, 0.18);
}

.pill.streaming {
    border-color: rgba(255, 69, 58, 0.16);
}

.pill.processing {
    --target-width: 112px;
    border-color: rgba(100, 167, 255, 0.18);
}

.pill.error {
    --target-width: 210px;
    border-color: rgba(255, 179, 64, 0.22);
}

.pill.canceled {
    --target-width: 100px;
}

.mark {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
}

.mark span {
    width: 2px;
    height: 7px;
    border-radius: 2px;
    background: var(--muted);
    transition: height 120ms ease, background 120ms ease, opacity 120ms ease;
}

.mark span:nth-child(2) { height: 12px; }
.mark span:nth-child(3) { height: 8px; }

.listening .mark span,
.streaming .mark span {
    background: var(--red);
    animation: voice 860ms ease-in-out infinite;
}

.listening .mark span:nth-child(2),
.streaming .mark span:nth-child(2) { animation-delay: 90ms; }

.listening .mark span:nth-child(3),
.streaming .mark span:nth-child(3) { animation-delay: 180ms; }

.processing .mark span {
    background: var(--blue);
    animation: breathe 760ms ease-in-out infinite;
}

.error .mark span { background: var(--gold); }
.canceled .mark span { background: var(--muted); }

.ticker {
    overflow: hidden;
    min-width: 0;
    color: var(--text);
    font-size: 13px;
    font-weight: 450;
    line-height: 1;
    white-space: nowrap;
}

.ticker.overflowing {
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 18px, black 100%);
    mask-image: linear-gradient(to right, transparent 0%, black 18px, black 100%);
}

.ticker-text {
    display: inline-block;
    transform: translateX(var(--ticker-offset));
    transition: transform 150ms linear;
}

.listening .ticker,
.idle .ticker {
    color: transparent;
}

.processing .ticker,
.canceled .ticker {
    color: var(--muted);
}

.error .ticker {
    color: var(--text);
}

@keyframes voice {
    0%, 100% { transform: scaleY(0.55); opacity: 0.62; }
    50% { transform: scaleY(1.18); opacity: 1; }
}

@keyframes breathe {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.38; }
}
</style>
</head>
<body>
<div id="pill" class="pill idle">
    <div class="mark" aria-hidden="true">
        <span></span><span></span><span></span>
    </div>
    <div id="ticker" class="ticker">
        <span id="txt" class="ticker-text"></span>
    </div>
</div>

<script>
const pill = document.getElementById('pill');
const ticker = document.getElementById('ticker');
const txt = document.getElementById('txt');

const MIN_WIDTH = 86;
const MAX_WIDTH = 260;
const TEXT_START = 100;
const CHAR_WIDTH = 8.2;

function clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
}

function setWidthForText(text) {
    const width = text ? clamp(TEXT_START + text.length * CHAR_WIDTH, MIN_WIDTH, MAX_WIDTH) : MIN_WIDTH;
    pill.style.setProperty('--target-width', `${width}px`);
}

function updateTickerOffset() {
    requestAnimationFrame(() => {
        const overflow = Math.max(0, txt.scrollWidth - ticker.clientWidth);
        pill.style.setProperty('--ticker-offset', `${-overflow}px`);
        ticker.classList.toggle('overflowing', overflow > 0);
    });
}

function showState(state, label) {
    pill.className = `pill ${state}`;
    txt.textContent = label || '';
    pill.style.setProperty('--ticker-offset', '0px');
    if (state === 'listening' || state === 'idle') {
        setWidthForText('');
    } else {
        setWidthForText(label || '');
        updateTickerOffset();
    }
}

function showRecording() {
    showState('listening', '');
}

function updateStreaming(text) {
    if (!text) return;
    pill.className = 'pill streaming';
    txt.textContent = text;
    setWidthForText(text);
    updateTickerOffset();
}

function showProcessing() {
    showState('processing', '处理中');
}

function showResult(text) {
    showState('success', '');
}

function showError(message) {
    showState('error', message || '出错了');
}
</script>
</body>
</html>
